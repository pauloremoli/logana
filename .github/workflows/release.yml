# Release workflow — triggered by pushing a version tag (e.g. v0.2.0).
#
# What it does:
#   1. Runs the full CI suite (fmt, clippy, tests).
#   2. Cross-compiles release binaries for all target platforms.
#   3. Creates a GitHub Release with the binaries, checksums, and
#      shell/PowerShell install scripts generated by cargo-dist.
#   4. Publishes the crate to crates.io.
#   5. Submits the updated Homebrew formula to the pauloremoli/homebrew-logana tap.
#
# Required repository secrets:
#   CARGO_REGISTRY_TOKEN  — crates.io API token
#   HOMEBREW_TAP_TOKEN    — GitHub PAT with write access to pauloremoli/homebrew-logana

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  # ── 1. CI gate ──────────────────────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # ── 2. Plan (dry-run) — validates the dist config ───────────────────────────
  dist-plan:
    name: cargo-dist plan
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      plan: ${{ steps.plan.outputs.manifest }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-dist
        run: cargo install cargo-dist --version "0.28.0" --locked
      - name: Plan release
        id: plan
        run: |
          cargo dist plan --output-format=json > dist-manifest.json
          echo "manifest=$(cat dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-manifest
          path: dist-manifest.json

  # ── 3. Build binaries ────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    needs: dist-plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compiled targets)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/logana
          ARCHIVE=logana-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BIN)" logana
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\logana.exe"
          $archive = "logana-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File "$archive.sha256" -Encoding ascii
          echo "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            logana-*
            *.sha256

  # ── 4. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate install scripts
        run: |
          # Shell install script (Linux / macOS)
          cat > install.sh <<'EOF'
          #!/bin/sh
          set -e
          REPO="pauloremoli/logana"
          VERSION="${1:-latest}"
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH="x86_64" ;;
            arm64|aarch64) ARCH="aarch64" ;;
            *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
          esac
          case "$OS" in
            linux)  TARGET="${ARCH}-unknown-linux-gnu" ;;
            darwin) TARGET="${ARCH}-apple-darwin" ;;
            *) echo "Unsupported OS: $OS" && exit 1 ;;
          esac
          if [ "$VERSION" = "latest" ]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest" | grep '"tag_name"' | cut -d'"' -f4)
          fi
          URL="https://github.com/${REPO}/releases/download/${VERSION}/logana-${VERSION}-${TARGET}.tar.gz"
          echo "Downloading logana ${VERSION} for ${TARGET}..."
          curl -fsSL "$URL" | tar -xz -C /tmp
          install -m755 /tmp/logana "${INSTALL_DIR:-/usr/local/bin}/logana"
          echo "logana installed successfully."
          EOF
          chmod +x install.sh

          # PowerShell install script (Windows)
          cat > install.ps1 <<'EOF'
          param([string]$Version = "latest")
          $Repo = "pauloremoli/logana"
          $Target = "x86_64-pc-windows-msvc"
          if ($Version -eq "latest") {
            $Version = (Invoke-RestMethod "https://api.github.com/repos/$Repo/releases/latest").tag_name
          }
          $Url = "https://github.com/$Repo/releases/download/$Version/logana-$Version-$Target.zip"
          $Tmp = Join-Path $env:TEMP "logana.zip"
          Write-Host "Downloading logana $Version..."
          Invoke-WebRequest -Uri $Url -OutFile $Tmp
          Expand-Archive -Path $Tmp -DestinationPath "$env:LOCALAPPDATA\logana" -Force
          Write-Host "logana installed to $env:LOCALAPPDATA\logana\logana.exe"
          Write-Host "Add that directory to your PATH."
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**
            install.sh
            install.ps1
          generate_release_notes: true
          fail_on_unmatched_files: false

  # ── 5. Publish to crates.io ──────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  # ── 6. Update Homebrew tap ───────────────────────────────────────────────────
  publish-homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts (for sha256 sums)
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute bottle hashes
        id: hashes
        run: |
          MAC_X86=$(cat artifacts/logana-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          MAC_ARM=$(cat artifacts/logana-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          LINUX=$(cat artifacts/logana-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')
          echo "mac_x86=$MAC_X86" >> "$GITHUB_OUTPUT"
          echo "mac_arm=$MAC_ARM" >> "$GITHUB_OUTPUT"
          echo "linux=$LINUX"     >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: pauloremoli/homebrew-logana
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          MAC_X86: ${{ steps.hashes.outputs.mac_x86 }}
          MAC_ARM: ${{ steps.hashes.outputs.mac_arm }}
          LINUX:   ${{ steps.hashes.outputs.linux }}
        run: |
          cp pkg/homebrew/logana.rb homebrew-tap/Formula/logana.rb
          # Inject version and sha256 hashes
          sed -i "s/VERSION_PLACEHOLDER/${VERSION#v}/g" homebrew-tap/Formula/logana.rb
          sed -i "s/SHA256_MAC_X86_PLACEHOLDER/$MAC_X86/g" homebrew-tap/Formula/logana.rb
          sed -i "s/SHA256_MAC_ARM_PLACEHOLDER/$MAC_ARM/g" homebrew-tap/Formula/logana.rb
          sed -i "s/SHA256_LINUX_PLACEHOLDER/$LINUX/g"     homebrew-tap/Formula/logana.rb

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/logana.rb
          git commit -m "logana ${{ github.ref_name }}"
          git push
